<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="panelDark" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDBA74"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="1400" height="720" rx="28" fill="url(#panelBg)"/>
  <rect x="26" y="26" width="1348" height="668" rx="24" stroke="#E2E8F0" stroke-width="1.5"/>

  <text x="70" y="84" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="18" letter-spacing="3">CROSSVIEWER</text>
  <text x="70" y="132" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">Perception -> Alignment -> Reasoning</text>
  <text x="70" y="170" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="21">An object-centric pipeline that tokenizes regions, aligns them across views, and reasons with a multimodal LLM.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="228" width="360" height="386" rx="28" fill="white"/>
    <rect x="466" y="228" width="360" height="386" rx="28" fill="white"/>
    <rect x="862" y="228" width="468" height="386" rx="28" fill="url(#panelDark)"/>
  </g>

  <g>
    <rect x="94" y="258" width="118" height="34" rx="17" fill="#ECFDF5"/>
    <text x="118" y="281" fill="#047857" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Stage 01</text>
    <text x="94" y="326" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Perception</text>
    <text x="94" y="360" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="18">Multi-view images and mask-grounded objects enter as structured evidence.</text>

    <rect x="94" y="404" width="100" height="108" rx="16" fill="#E2E8F0"/>
    <rect x="108" y="418" width="72" height="80" rx="12" fill="url(#green)"/>
    <circle cx="132" cy="444" r="11" fill="rgba(255,255,255,0.85)"/>
    <rect x="140" y="456" width="24" height="22" rx="8" fill="rgba(255,255,255,0.85)"/>
    <rect x="206" y="418" width="72" height="80" rx="12" fill="#DBEAFE"/>
    <circle cx="228" cy="450" r="9" fill="#2563EB"/>
    <circle cx="250" cy="470" r="10" fill="#60A5FA"/>
    <rect x="304" y="418" width="72" height="80" rx="12" fill="#FCE7F3"/>
    <circle cx="330" cy="446" r="10" fill="#EC4899"/>
    <rect x="320" y="462" width="25" height="18" rx="9" fill="#FB7185"/>

    <path d="M126 530H352" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="148" cy="530" r="9" fill="#10B981"/>
    <circle cx="210" cy="530" r="9" fill="#2563EB"/>
    <circle cx="272" cy="530" r="9" fill="#EC4899"/>
    <circle cx="334" cy="530" r="9" fill="#F59E0B"/>

    <text x="94" y="576" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Inputs</text>
    <text x="94" y="604" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="17">Images, object masks, multi-view questions, and answer supervision.</text>
  </g>

  <g>
    <rect x="490" y="258" width="100" height="34" rx="17" fill="#EFF6FF"/>
    <text x="514" y="281" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Stage 02</text>
    <text x="490" y="326" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Alignment</text>
    <text x="490" y="360" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="18">ART builds object tokens. OCVA aligns them across views before reasoning.</text>

    <text x="490" y="410" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">ART</text>
    <rect x="490" y="430" width="142" height="18" rx="9" fill="#D1FAE5"/>
    <rect x="490" y="456" width="112" height="18" rx="9" fill="#A7F3D0"/>
    <rect x="490" y="482" width="132" height="18" rx="9" fill="#6EE7B7"/>

    <text x="672" y="410" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">OCVA</text>
    <circle cx="700" cy="442" r="14" fill="#BFDBFE"/>
    <circle cx="740" cy="462" r="14" fill="#93C5FD"/>
    <circle cx="780" cy="442" r="14" fill="#60A5FA"/>
    <path d="M712 452L728 456" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
    <path d="M752 456L768 448" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>

    <rect x="490" y="538" width="288" height="44" rx="22" fill="#F8FAFC" stroke="#CBD5E1"/>
    <text x="522" y="566" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">object-aware aligned representation</text>
  </g>

  <g>
    <rect x="886" y="258" width="112" height="34" rx="17" fill="rgba(255,255,255,0.10)"/>
    <text x="911" y="281" fill="#BFDBFE" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Stage 03</text>
    <text x="886" y="326" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Reasoning</text>
    <text x="886" y="360" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Aligned visual evidence is consumed by Qwen3-VL for cross-view QA and retrieval-style supervision.</text>

    <rect x="886" y="404" width="190" height="142" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
    <text x="910" y="438" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Question</text>
    <text x="910" y="472" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="19">Which camera sees</text>
    <text x="910" y="498" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="19">the same object</text>
    <text x="910" y="524" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="19">after occlusion?</text>

    <rect x="1100" y="404" width="206" height="142" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
    <text x="1124" y="438" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Outputs</text>
    <path d="M1124 472H1268" stroke="#7DD3FC" stroke-width="8" stroke-linecap="round"/>
    <path d="M1124 500H1238" stroke="#5EEAD4" stroke-width="8" stroke-linecap="round"/>
    <path d="M1124 528H1208" stroke="#FDBA74" stroke-width="8" stroke-linecap="round"/>

    <rect x="886" y="568" width="420" height="22" rx="11" fill="rgba(255,255,255,0.08)"/>
    <rect x="886" y="568" width="248" height="22" rx="11" fill="url(#red)"/>
    <text x="886" y="638" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="17">Jointly optimized with VQA loss and contrastive objectives.</text>
  </g>

  <path d="M430 420H466" stroke="#94A3B8" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M826 420H862" stroke="#94A3B8" stroke-width="3.5" marker-end="url(#arrow)"/>
</svg>
