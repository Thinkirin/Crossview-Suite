


model:
  vision_encoder_path: null  
  freeze_vision_encoder: true
  num_object_tokens: 10
  num_cross_attn_heads: 8
  contrast_dim: 256
  
  attn_implementation: null
  use_all_views_for_vqa: true
  use_all_views_for_infonce: true
  match_mode: "greedy"                     
  region_source: "fused"                   
  
  use_global_attention: false
  
  use_consistency_constraint: false
  consistency_weight: 0.1
  unfreeze_lm_head: false


loss:
  temperature: 0.07
  info_nce_weight: 1.0
  triplet_weight: 0.1
  vqa_weight: 0.5


data:
  data_root: null  
  
  jsonl_train: null
  jsonl_val: null
  include_options_in_question: true
  cutoff_len: null
  prompt_template: null
  max_samples_train: null
  max_samples_val: null
  max_objects_per_sample: 5
  image_size: [448, 448]
  num_workers: 8

  
  num_cameras_infonce: 2                    
  enumerate_camera_pairs: true              

  
  min_cameras_vqa: 3                        
  max_cameras_vqa: null                     
  enumerate_camera_combinations: true       

  
  min_frame_interval: 1                     
  max_frames_per_take: 1000                 

  
  generate_questions: true                  
  max_reid_questions_per_sample: 5          
  max_counting_questions_per_sample: 1      
  max_camera_pose_questions_per_sample: 1   
  compute_infonce_once: true                
  task_distribution:                        
    reid: 0.5
    counting: 0.3
    camera_pose: 0.2


training:
  batch_size: 8  
  gradient_accumulation_steps: 1
  num_epochs: 20
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  warmup_ratio: null
  gradient_clip: 1.0
  min_lr: 1.0e-6
  save_steps: null
  eval_steps: null
  resume_from: null
  resume_tag: null
  lr_scheduler_type: cosine
  save_only_model: false
  report_to: tensorboard
  run_name: null
  plot_loss: false
  mlflow_tracking_uri: null

  
  use_ddp: true
  num_gpus: 4
  use_deepspeed: false
  deepspeed_config: "./deepspeed_zero2.json"

  
  save_dir: "../checkpoints"
  save_freq: 1  
  eval_freq: 1  

  
  log_dir: "../logs"
  log_freq: 10  
  wandb_project: "CrossViewer"
  wandb_name: "crossviewer_baseline"


evaluation:
  batch_size: 16
  metrics: ["accuracy", "recall@5", "recall@10", "mAP"]


optimizer:
  type: "adamw"
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  type: "cosine"
  min_lr: 1.0e-6
  warmup_ratio: 0.05


seed: 42
deterministic: true
